---
# commit to panorama then push to device groups
# validates commit job before push - stops bad configs reaching devices
# if push fails check device group names in panorama_push/defaults/main.yml

- name: Commit Panorama config
  paloaltonetworks.panos.panos_commit_panorama:
    provider: "{{ panorama_provider }}"
    description: "Ansible commit - {{ ansible_date_time.iso8601 }}"
  register: panorama_commit

- name: Verify commit job ID exists
  ansible.builtin.assert:
    that:
      - panorama_commit.jobid is defined
    fail_msg: "Panorama commit failed, aborting push"

- name: Wait for commit to finish
  paloaltonetworks.panos.panos_op:
    provider: "{{ panorama_provider }}"
    cmd: "show jobs id {{ panorama_commit.jobid }}"
  register: commit_status
  until: "'FIN' in commit_status.stdout"
  retries: 30
  delay: 10

- name: Push to device groups
  paloaltonetworks.panos.panos_commit_push:
    provider: "{{ panorama_provider }}"
    style: "device group"
    name: "{{ item }}"
    description: "Push from Ansible - {{ ansible_date_time.iso8601 }}"
    include_template: true
  loop: "{{ panorama_push_device_groups }}"
  register: push_results

- name: Wait for push jobs to finish
  paloaltonetworks.panos.panos_op:
    provider: "{{ panorama_provider }}"
    cmd: "show jobs id {{ item.jobid }}"
  register: push_status
  until: "'FIN' in push_status.stdout"
  retries: 60
  delay: 15
  loop: "{{ push_results.results }}"
  when: item.jobid is defined

- name: Push summary
  ansible.builtin.debug:
    msg: "Pushed to {{ item.item }} - job {{ item.jobid | default('n/a') }}"
  loop: "{{ push_results.results }}"
