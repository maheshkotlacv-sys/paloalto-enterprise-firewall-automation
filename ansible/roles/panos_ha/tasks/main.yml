---
# active/passive ha setup
# HA1 = heartbeat + config sync (port 28769)
# HA2 = session sync
# preemption OFF by default - dont want unnecessary failovers
# run this on both primary and secondary, panos_role var controls which block runs

- name: Configure HA on primary
  when: panos_role == "active"
  block:
    - name: HA general settings - primary
      paloaltonetworks.panos.panos_ha:
        provider: "{{ panos_provider }}"
        state: present
        ha_mode: "active-passive"
        ha_group_id: "{{ panos_ha_group_id | default(1) }}"
        ha_description: "aws vm-series ha pair"
        enable_ha: true
        device_priority: 10
        preemptive: false

    - name: HA1 interface config - primary
      paloaltonetworks.panos.panos_ha1:
        provider: "{{ panos_provider }}"
        interface: "ethernet1/3"
        ip_address: "{{ panos_ha_ha1_primary_ip }}"
        netmask: "{{ panos_ha_ha1_netmask | default('255.255.255.252') }}"
        port: 28769
        encryption: true

    - name: HA2 interface config - primary
      paloaltonetworks.panos.panos_ha2:
        provider: "{{ panos_provider }}"
        interface: "ethernet1/4"
        ip_address: "{{ panos_ha_ha2_primary_ip }}"
        netmask: "{{ panos_ha_ha2_netmask | default('255.255.255.252') }}"
        enable_session_sync: true
        transport: "ethernet"

    - name: Set peer address (secondary HA1 IP)
      paloaltonetworks.panos.panos_ha_peer:
        provider: "{{ panos_provider }}"
        ha1_ip_address: "{{ panos_ha_ha1_secondary_ip }}"
        ha1_backup_ip_address: "{{ panos_ha_ha1_backup_secondary_ip | default('') }}"
  notify: Commit HA config

- name: Configure HA on secondary
  when: panos_role == "passive"
  block:
    - name: HA general settings - secondary
      paloaltonetworks.panos.panos_ha:
        provider: "{{ panos_provider }}"
        state: present
        ha_mode: "active-passive"
        ha_group_id: "{{ panos_ha_group_id | default(1) }}"
        ha_description: "aws vm-series ha pair"
        enable_ha: true
        device_priority: 20
        preemptive: false

    - name: HA1 interface config - secondary
      paloaltonetworks.panos.panos_ha1:
        provider: "{{ panos_provider }}"
        interface: "ethernet1/3"
        ip_address: "{{ panos_ha_ha1_secondary_ip }}"
        netmask: "{{ panos_ha_ha1_netmask | default('255.255.255.252') }}"
        port: 28769
        encryption: true

    - name: HA2 interface config - secondary
      paloaltonetworks.panos.panos_ha2:
        provider: "{{ panos_provider }}"
        interface: "ethernet1/4"
        ip_address: "{{ panos_ha_ha2_secondary_ip }}"
        netmask: "{{ panos_ha_ha2_netmask | default('255.255.255.252') }}"
        enable_session_sync: true
        transport: "ethernet"

    - name: Set peer address (primary HA1 IP)
      paloaltonetworks.panos.panos_ha_peer:
        provider: "{{ panos_provider }}"
        ha1_ip_address: "{{ panos_ha_ha1_primary_ip }}"
  notify: Commit HA config

- name: Check HA state after config
  paloaltonetworks.panos.panos_op:
    provider: "{{ panos_provider }}"
    cmd: "show ha state"
  register: panos_ha_state

- name: Show HA state
  ansible.builtin.debug:
    msg: "HA state: {{ panos_ha_state.stdout }}"
