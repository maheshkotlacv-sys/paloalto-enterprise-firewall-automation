---
# main playbook - runs all roles in order
# dry run first: ansible-playbook playbooks/site.yml -i inventory/hosts.yml --check

- name: Baseline hardening
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_baseline

- name: Threat prevention profiles
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_threat_profiles

- name: Logging config
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_logging

- name: NAT policy
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_nat_policy

- name: Security policy
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_security_policy

- name: DC-to-AWS VPN
  hosts: aws_vmseries
  gather_facts: false
  roles:
    - panos_vpn

- name: Panorama commit and push
  hosts: panorama
  gather_facts: false
  roles:
    - panorama_push
