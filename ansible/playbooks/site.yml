---
# main playbook - runs all roles in order
# dry run first: ansible-playbook playbooks/site.yml -i inventory/hosts.yml --check

- name: baseline hardening
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_baseline

- name: threat prevention profiles
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_threat_profiles

- name: logging config
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_logging

- name: nat policy
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_nat_policy

- name: security policy
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_security_policy

- name: dc-to-aws vpn
  hosts: aws_vmseries
  gather_facts: false
  roles:
    - panos_vpn

- name: panorama commit and push
  hosts: panorama
  gather_facts: false
  roles:
    - panorama_push
