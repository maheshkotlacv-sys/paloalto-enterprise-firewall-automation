---
- name: Deploy DC-to-AWS vpn config
  hosts: aws_vmseries:dc_firewalls
  gather_facts: false
  roles:
    - panos_vpn

- name: Verify VPN tunnel status
  hosts: aws_vmseries
  gather_facts: false
  tasks:
    - name: Check tunnel operational state
      paloaltonetworks.panos.panos_op:
        provider: "{{ panos_provider }}"
        cmd: "show vpn ike-sa"
      register: ike_status

    - name: Display IKE SA status
      ansible.builtin.debug:
        var: ike_status.stdout

    - name: Fail if tunnel not established
      ansible.builtin.fail:
        msg: "ike sa not established - vpn tunnel is down"
      when: "'IKE phase-1 SA' not in ike_status.stdout"
