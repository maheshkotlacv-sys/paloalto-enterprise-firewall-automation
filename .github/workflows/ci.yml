name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install paloaltonetworks.panos
      - name: Run ansible-lint
        run: ansible-lint ansible/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
      - name: Terraform fmt check
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Terraform init
        run: terraform -chdir=terraform init -backend=false
      - name: Terraform validate
        run: terraform -chdir=terraform validate

  tfsec:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true

  opa-policy:
    name: OPA Policy Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Conftest
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.52.0/conftest_0.52.0_Linux_x86_64.tar.gz
          tar xzf conftest.tar.gz && sudo mv conftest /usr/local/bin/
      - name: Generate test input
        run: |
          cat > /tmp/policy-input.json << JSONEOF
          {
            "resource_changes": [
              {
                "address": "module.security_groups.aws_security_group.mgmt",
                "type": "aws_security_group",
                "change": {
                  "after": {
                    "ingress": [
                      {"from_port": 443, "to_port": 443, "protocol": "tcp", "cidr_blocks": ["10.0.0.0/8"]},
                      {"from_port": 22, "to_port": 22, "protocol": "tcp", "cidr_blocks": ["10.0.0.0/8"]}
                    ]
                  }
                }
              }
            ]
          }
          JSONEOF
      - name: Run OPA policy checks
        run: conftest test /tmp/policy-input.json -p policies/opa

  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r python/requirements.txt
      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          PANOS_USERNAME: test-user
          PANOS_PASSWORD: test-pass
          PANORAMA_HOSTNAME: 127.0.0.1

  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check required files
        run: |
          python3 - << PYEOF
          import sys
          required = [
              "README.md", "LICENSE", "CONTRIBUTING.md", "SECURITY.md", "Makefile",
              "terraform/main.tf", "terraform/variables.tf",
              "ansible/playbooks/site.yml", "ansible/ansible.cfg",
              "python/requirements.txt", "python/pan_rule_audit.py",
              "python/pan_config_backup.py", "python/pan_compliance_report.py",
              "policies/opa/firewall_policy.rego",
              "docs/architecture.md", "docs/threat-model.md",
          ]
          missing = [f for f in required if not __import__("pathlib").Path(f).exists()]
          if missing:
              print("MISSING FILES:", missing)
              sys.exit(1)
          print(f"All {len(required)} required files present.")
          PYEOF
